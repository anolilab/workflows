# https://help.github.com/en/categories/automating-your-workflow-with-github-actions
#
# Reusable: this workflow can be called from consumer repos via `workflow_call`.
# Runs zizmor (https://docs.zizmor.sh/) against .github/workflows/ to flag
# CI security issues. Findings at or above `inputs.min_severity` fail the check.
name: "Zizmor"

on: # yamllint disable-line rule:truthy
    workflow_dispatch: # yamllint disable-line rule:empty-values
    # Runs on every PR so it can be wired up as a required status check.
    # Path-filtered triggers are skipped — and "skipped" required checks block merges.
    pull_request:
        types: ["opened", "synchronize", "reopened"]
        branches: ["main"]
    push:
        branches: ["main"]
    workflow_call:
        inputs:
            min_severity:
                description: "Minimum severity to fail on (informational | low | medium | high)."
                required: false
                type: "string"
                default: "medium"

concurrency:
    group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}"
    cancel-in-progress: true

permissions: {}

jobs:
    zizmor:
        name: "Zizmor"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        permissions:
            security-events: "write"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  persist-credentials: false

            - name: "Install zizmor"
              uses: "taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853" # v2.83.2
              with:
                  tool: "zizmor"

            # `tee` keeps the exit code from zizmor (vs `>` which always returns 0),
            # so a finding at or above --min-severity fails the PR check.
            - name: "Run zizmor"
              env:
                  GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
                  MIN_SEVERITY: "${{ inputs.min_severity || 'medium' }}"
              run: "zizmor --min-severity \"$MIN_SEVERITY\" --format sarif . | tee results.sarif"

            - name: "Upload SARIF file"
              if: "always()"
              uses: "github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9" # v4.37.0
              with:
                  sarif_file: "results.sarif"
                  category: "zizmor"
