# https://help.github.com/en/categories/automating-your-workflow-with-github-actions
#
# Reusable test runner. Designed to be called from consumer repos via `workflow_call`.
# Runs `inputs.test_command` across the matrix defined by `inputs.node_versions` x `inputs.os_matrix`.
# If `inputs.coverage` is true and the `codecov_token` secret is provided, coverage is uploaded
# from the first (lowest-index) matrix cell only to avoid duplicate uploads.
name: "Tests"

on: # yamllint disable-line rule:truthy
    pull_request:
        types: ["opened", "synchronize", "reopened"]
        branches: ["main"]
    merge_group: # yamllint disable-line rule:empty-values
    workflow_call:
        inputs:
            node_versions:
                description: "JSON array of Node.js versions (e.g. '[\"22\", \"24\"]'). Node 20 is unsupported: the pinned pnpm requires node:sqlite (Node >=22)."
                required: false
                type: "string"
                default: "[\"22\", \"24\"]"
            os_matrix:
                description: "JSON array of runner images (e.g. '[\"ubuntu-latest\", \"macos-15\"]')."
                required: false
                type: "string"
                default: "[\"ubuntu-latest\"]"
            extra_includes:
                description: "JSON array of additional matrix combinations (e.g. '[{\"os\": \"macos-latest\", \"node\": 20}]')."
                required: false
                type: "string"
                default: "[]"
            test_command:
                description: "Shell command that runs the test suite."
                required: false
                type: "string"
                default: "pnpm test"
            coverage:
                description: "Upload coverage to Codecov from the lowest-index matrix cell."
                required: false
                type: "boolean"
                default: false
        secrets:
            codecov_token:
                description: "Codecov upload token (required when coverage=true for private repos)."
                required: false

concurrency:
    group: "${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

permissions:
    contents: "read" # to fetch code (actions/checkout)

jobs:
    test:
        name: "Test (node-${{ matrix.node }}, ${{ matrix.os }})"
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                os: "${{ fromJSON(inputs.os_matrix || '[\"ubuntu-latest\"]') }}"
                node: "${{ fromJSON(inputs.node_versions || '[\"22\", \"24\"]') }}"
                include: "${{ fromJSON(inputs.extra_includes || '[]') }}"
        runs-on: "${{ matrix.os }}"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  persist-credentials: false
                  fetch-depth: 0
              env:
                  GIT_COMMITTER_NAME: "GitHub Actions Shell"
                  GIT_AUTHOR_NAME: "GitHub Actions Shell"
                  EMAIL: "github-actions[bot]@users.noreply.github.com"

            - name: "Setup pnpm"
              uses: "pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271" # v6.0.9
              with:
                  run_install: false

            - name: "Use Node.js ${{ matrix.node }}"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version: "${{ matrix.node }}"

            - name: "Resolve pnpm store path"
              id: "pnpm-store"
              shell: "bash"
              run: |
                  echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

            - name: "Restore pnpm store"
              id: "pnpm-cache"
              uses: "actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9" # v6.1.0
              with:
                  path: "${{ steps.pnpm-store.outputs.path }}"
                  key: "pnpm-store-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('pnpm-lock.yaml') }}"
                  restore-keys: |
                      pnpm-store-${{ runner.os }}-node${{ matrix.node }}-
                      pnpm-store-${{ runner.os }}-

            - name: "Install dependencies"
              run: "pnpm install --frozen-lockfile"

            # Only write back to the shared cache from trusted refs (push to main, not PRs/forks).
            - name: "Save pnpm store"
              if: "github.event_name == 'push' && steps.pnpm-cache.outputs.cache-hit != 'true'"
              uses: "actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9" # v6.1.0
              with:
                  path: "${{ steps.pnpm-store.outputs.path }}"
                  key: "${{ steps.pnpm-cache.outputs.cache-primary-key }}"

            - name: "Run tests"
              shell: "bash"
              env:
                  TEST_COMMAND: "${{ inputs.test_command || 'pnpm test' }}"
                  IS_DEFAULT_COMMAND: "${{ inputs.test_command == '' || inputs.test_command == null }}"
              run: |
                  set -euo pipefail
                  # When using the default `pnpm test` and the repo ships no `test`
                  # script (e.g. a meta/config repo with nothing to test), skip
                  # instead of hard-failing with ERR_PNPM_NO_SCRIPT. A consumer that
                  # passes an explicit test_command always runs as-is.
                  if [ "$IS_DEFAULT_COMMAND" = "true" ] && ! node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)" 2>/dev/null; then
                      echo "::notice::No \"test\" script found in package.json; skipping the default test command."
                      exit 0
                  fi
                  eval "$TEST_COMMAND"

            # Coverage uploads only fire from the first matrix cell to avoid double-counting.
            # `strategy.job-index == 0` is the lowest combination (lowest node x lowest os).
            - name: "Upload coverage to Codecov"
              if: "inputs.coverage == true && strategy.job-index == 0"
              uses: "anolilab/workflows/step/codecov@561a54257113a4bd1346bf10a022063faca27680" # main
              with:
                  codecov-token: "${{ secrets.codecov_token }}"

    test-required-check:
        needs: ["test"]
        name: "Check Test Run"
        if: "always()"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 5
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Check for failures"
              if: "contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')"
              run: |
                  echo "One of the dependent jobs have failed. You may need to re-run it." && exit 1
