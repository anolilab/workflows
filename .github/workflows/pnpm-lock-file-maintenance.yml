# Note: this is a shared pipeline used by other repositories.
# Docs: https://docs.github.com/en/actions/using-workflows/reusing-workflows

name: "Lock File Maintenance"

on: # yamllint disable-line rule:truthy
    workflow_call:
        inputs:
            target-repo:
                description: "The repo to run this action on. This is to prevent actions from running on forks unless intended."
                required: true
                type: "string"

            node-version:
                description: "The node version to use for the job."
                required: true
                type: "string"

            run-audit-fix:
                description: "Run pnpm audit --fix to automatically fix vulnerabilities."
                required: false
                type: "boolean"
                default: true

        secrets:
            github-token:
                description: "GitHub token for checkout with write permissions."
                required: false

permissions:
    contents: "read" # for checkout

jobs:
    lock-file:
        name: "Lock File Maintenance"
        if: "github.repository == inputs.target-repo"
        runs-on: "ubuntu-latest"
        permissions:
            contents: "write"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450" # v2.19.1
              with:
                  egress-policy: "audit"

            # Persist credentials so the downstream git-auto-commit-action can push
            # using the explicitly-passed token.
            - name: "Git checkout" # zizmor: ignore[artipacked]
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
              with:
                  token: "${{ secrets.github-token || secrets.GITHUB_TOKEN }}"
              env:
                  GIT_COMMITTER_NAME: "GitHub Actions Shell"
                  GIT_AUTHOR_NAME: "GitHub Actions Shell"
                  EMAIL: "github-actions[bot]@users.noreply.github.com"

            - name: "Setup resources and environment"
              id: "setup"
              uses: "anolilab/workflows/step/setup@4d64c69615fa68e3987c9e6449a359e797bf337e" # main
              with:
                  node-version: "${{ inputs.node-version }}"
                  cache-prefix: "lock-file-update"
                  install-packages: "false"
                  run-npm-audit: "false"
                  run-signatures-audit: "false"

            - name: "Run pnpm audit --fix"
              if: "success() && inputs.run-audit-fix"
              run: "pnpm audit --fix --ignore-registry-errors || true"

            - name: "Update lock file"
              if: "success()"
              run: "pnpm install --lockfile-only && pnpm dedupe"

            - name: "Commit lock file"
              if: "success()"
              uses: "stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9" # v7.1.0
              with:
                  file_pattern: "pnpm-lock.yaml package.json **/package.json"
                  commit_message: "chore: updated lock file [ci skip]"
                  commit_user_name: "github-actions-shell"
                  commit_user_email: "github-actions[bot]@users.noreply.github.com"
                  commit_author: "github-actions-shell <github-actions[bot]@users.noreply.github.com>"
