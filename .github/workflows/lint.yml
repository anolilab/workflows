# https://help.github.com/en/categories/automating-your-workflow-with-github-actions
#
# Reusable: this workflow can be called from consumer repos via `workflow_call`.
# Each lint job is independently toggleable via inputs so consumers only run
# the checks that apply to their codebase (e.g. opt out of attw/rust/markdown).
name: "Lint"

on: # yamllint disable-line rule:truthy
    # eslint-disable-next-line yml/no-empty-mapping-value
    pull_request: # yamllint disable-line rule:empty-values
        types: ["opened", "synchronize"]
    merge_group: # yamllint disable-line rule:empty-values
    workflow_call:
        inputs:
            lint_eslint:
                description: "Run eslint (consolidated with types/attw in the ts-lint job)."
                required: false
                type: "boolean"
                default: true
            lint_types:
                description: "Run typescript types lint."
                required: false
                type: "boolean"
                default: true
            lint_attw:
                description: "Run @arethetypeswrong/cli (only for libs publishing types)."
                required: false
                type: "boolean"
                default: false
            lint_package_json:
                description: "Run package.json lint (publint / sort-package-json checks)."
                required: false
                type: "boolean"
                default: true
            lint_markdown:
                description: "Run markdown lint."
                required: false
                type: "boolean"
                default: false
            lint_yaml:
                description: "Run yaml lint (yamllint) across the repo."
                required: false
                type: "boolean"
                default: true
            lint_actionlint:
                description: "Run raven-actions/actionlint against .github/workflows/."
                required: false
                type: "boolean"
                default: true
            lint_rust:
                description: "Run cargo fmt --check on every Cargo.toml in the workspace."
                required: false
                type: "boolean"
                default: false
            node_version:
                description: "Node.js version for setup steps."
                required: false
                type: "string"
                default: "22"
            file_filters_path:
                description: "Path to the dorny/paths-filter filters file."
                required: false
                type: "string"
                default: ".github/file-filters.yml"

concurrency:
    group: "ci-lint-${{ github.ref }}-1"
    cancel-in-progress: true

permissions:
    contents: "read" # to fetch code (actions/checkout)

jobs:
    files-changed:
        name: "Detect what files changed"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 3
        outputs:
            frontend_lintable: "${{ steps.changes.outputs.frontend_lintable }}"
            markdown_lintable: "${{ steps.changes.outputs.markdown_lintable }}"
            yaml_lintable: "${{ steps.changes.outputs.yaml_lintable }}"
            package_json_lintable: "${{ steps.changes.outputs.package_json_lintable }}"
            rust_lintable: "${{ steps.changes.outputs.rust_lintable }}"
            filters_present: "${{ steps.filters-check.outputs.present }}"
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  persist-credentials: false

            # If the consumer doesn't ship a filters file, skip the changes step
            # and let each job rely on its `inputs.lint_*` toggle alone. This
            # keeps the workflow callable from repos without a paths-filter config.
            - name: "Check for filters file"
              id: "filters-check"
              shell: "bash"
              env:
                  FILTERS_PATH: "${{ inputs.file_filters_path || '.github/file-filters.yml' }}"
              run: |
                  if [ -f "$FILTERS_PATH" ]; then
                      echo "present=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "present=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: "Check for file changes"
              if: "steps.filters-check.outputs.present == 'true'"
              uses: "dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706" # v4.0.2
              id: "changes"
              with:
                  token: "${{ github.token }}"
                  filters: "${{ inputs.file_filters_path || '.github/file-filters.yml' }}"

    # Consolidated: eslint + types + attw (build once, lint up to three times).
    # The job is skipped entirely if all three toggles are false.
    ts-lint:
        if: |
            needs.files-changed.result == 'success'
            && (inputs.lint_eslint != false || inputs.lint_types != false || inputs.lint_attw == true)
            && (needs.files-changed.outputs.filters_present != 'true' || needs.files-changed.outputs.frontend_lintable == 'true')
        needs: "files-changed"
        name: "Lint (eslint, types, attw)"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  persist-credentials: false
                  fetch-depth: 0
              env:
                  GIT_COMMITTER_NAME: "GitHub Actions Shell"
                  GIT_AUTHOR_NAME: "GitHub Actions Shell"
                  EMAIL: "github-actions[bot]@users.noreply.github.com"

            - name: "Derive appropriate SHAs for base and head for `nx affected` commands"
              id: "setSHAs"
              uses: "nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1" # v5.0.1

            - name: "Setup resources and environment"
              id: "setup"
              uses: "anolilab/workflows/step/node@589efd6bc60515a7b9a963c1e2c95905b8b30b94" # main
              with:
                  node-version: "${{ inputs.node_version || '22' }}"
                  install-node-gyp: "true"
                  cache-prefix: "lint"
                  run-npm-audit: false
                  run-signatures-audit: false

            - name: "Build"
              run: "pnpm run build:affected:packages"

            - name: "lint eslint"
              if: "inputs.lint_eslint != false"
              run: "pnpm run lint:affected:eslint"

            - name: "lint typescript types"
              if: "inputs.lint_types != false"
              run: "pnpm run lint:affected:types"

            - name: "lint attw"
              if: "inputs.lint_attw == true"
              run: "pnpm run lint:affected:attw"

    package-json-lint:
        if: |
            needs.files-changed.result == 'success'
            && inputs.lint_package_json != false
            && (needs.files-changed.outputs.filters_present != 'true' || needs.files-changed.outputs.package_json_lintable == 'true')
        needs: "files-changed"
        name: "Lint (package.json)"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  persist-credentials: false
                  fetch-depth: 0
              env:
                  GIT_COMMITTER_NAME: "GitHub Actions Shell"
                  GIT_AUTHOR_NAME: "GitHub Actions Shell"
                  EMAIL: "github-actions[bot]@users.noreply.github.com"

            - name: "Derive appropriate SHAs for base and head for `nx affected` commands"
              id: "setSHAs"
              uses: "nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1" # v5.0.1

            - name: "Setup resources and environment"
              id: "setup"
              uses: "anolilab/workflows/step/node@589efd6bc60515a7b9a963c1e2c95905b8b30b94" # main
              with:
                  node-version: "${{ inputs.node_version || '22' }}"
                  install-node-gyp: "true"
                  cache-prefix: "lint"
                  run-npm-audit: false
                  run-signatures-audit: false

            - name: "Build"
              run: "pnpm run build:affected:packages"

            - name: "lint package.json"
              run: "pnpm run lint:affected:package-json"

    yaml-lint:
        if: |
            needs.files-changed.result == 'success'
            && inputs.lint_yaml != false
            && (needs.files-changed.outputs.filters_present != 'true' || needs.files-changed.outputs.yaml_lintable == 'true')
        needs: "files-changed"
        name: "Lint (yaml)"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  persist-credentials: false
              env:
                  GIT_COMMITTER_NAME: "GitHub Actions Shell"
                  GIT_AUTHOR_NAME: "GitHub Actions Shell"
                  EMAIL: "github-actions[bot]@users.noreply.github.com"

            - name: "Lint YAML files"
              uses: "ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c" # v3.1.1
              with:
                  config_file: ".yamllint.yaml"
                  file_or_dir: "."
                  strict: true

    lint-workflows:
        if: |
            needs.files-changed.result == 'success'
            && inputs.lint_actionlint != false
            && (needs.files-changed.outputs.filters_present != 'true' || needs.files-changed.outputs.yaml_lintable == 'true')
        needs: "files-changed"
        name: "Lint (github workflows)"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  persist-credentials: false
              env:
                  GIT_COMMITTER_NAME: "GitHub Actions Shell"
                  GIT_AUTHOR_NAME: "GitHub Actions Shell"
                  EMAIL: "github-actions[bot]@users.noreply.github.com"

            # raven-actions/actionlint runs `npm install` in the workspace root
            # to fetch @actions/tool-cache. If package.json declares pnpm
            # `catalog:` dependencies, npm fails with EUNSUPPORTEDPROTOCOL.
            # actionlint only reads .github/workflows/*.yml, so hiding the
            # package.json from npm is safe for this job.
            - name: "Hide package.json from npm"
              shell: "bash"
              run: |
                  if [ -f package.json ]; then
                      mv package.json /tmp/package.json.lint-stash
                  fi

            - name: "actionlint"
              uses: "raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7" # v2.2.0
              with:
                  matcher: true
                  fail-on-error: true

    rust-fmt:
        if: |
            needs.files-changed.result == 'success'
            && inputs.lint_rust == true
            && (needs.files-changed.outputs.filters_present != 'true' || needs.files-changed.outputs.rust_lintable == 'true')
        needs: "files-changed"
        name: "Lint (rustfmt)"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  persist-credentials: false

            - name: "Install Rust toolchain"
              uses: "oxc-project/setup-rust@3d6fb132fbe7cdcb66bf8ec193911c2945369d12" # v1.0.17
              with:
                  components: "rustfmt"
                  restore-cache: false

            - name: "Check formatting (all workspace crates)"
              shell: "bash"
              run: |
                  set -euo pipefail
                  mapfile -t manifests < <(find . -name Cargo.toml -not -path '*/target/*' -not -path '*/node_modules/*')
                  if [ "${#manifests[@]}" -eq 0 ]; then
                      echo "No Cargo.toml manifests found; skipping rustfmt."
                      exit 0
                  fi
                  for manifest in "${manifests[@]}"; do
                      echo "==> cargo fmt --check --manifest-path $manifest"
                      cargo fmt --check --manifest-path "$manifest"
                  done

    markdown-lint:
        if: |
            needs.files-changed.result == 'success'
            && inputs.lint_markdown != false
            && (needs.files-changed.outputs.filters_present != 'true' || needs.files-changed.outputs.markdown_lintable == 'true')
        needs: "files-changed"
        name: "Lint (markdown)"
        runs-on: "ubuntu-latest"
        timeout-minutes: 30
        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Git checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  persist-credentials: false
              env:
                  GIT_COMMITTER_NAME: "GitHub Actions Shell"
                  GIT_AUTHOR_NAME: "GitHub Actions Shell"
                  EMAIL: "github-actions[bot]@users.noreply.github.com"

            - uses: "pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271" # v6.0.9
              with:
                  run_install: false

            - name: "Use Node.js"
              uses: "actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38" # v6.5.0
              with:
                  node-version: "${{ inputs.node_version || '22' }}"

            - name: "Resolve pnpm store path"
              id: "pnpm-store"
              shell: "bash"
              run: |
                  echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

            - name: "Restore pnpm store"
              id: "pnpm-cache"
              uses: "actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9" # v6.1.0
              with:
                  path: "${{ steps.pnpm-store.outputs.path }}"
                  key: "pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}"
                  restore-keys: |
                      pnpm-store-${{ runner.os }}-

            - name: "Install dependencies"
              run: "pnpm install --frozen-lockfile"

            # Only write back to the shared cache from trusted refs.
            - name: "Save pnpm store"
              if: "github.event_name == 'push' && steps.pnpm-cache.outputs.cache-hit != 'true'"
              uses: "actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9" # v6.1.0
              with:
                  path: "${{ steps.pnpm-store.outputs.path }}"
                  key: "${{ steps.pnpm-cache.outputs.cache-primary-key }}"

            - name: "Lint markdown"
              run: "pnpm run lint:text"

    # This check runs once all dependant jobs have passed
    # It symbolizes that all required Lint checks have successfully passed (Or skipped)
    # This check is the only required GitHub check
    test-required-check:
        needs: ["files-changed", "ts-lint", "package-json-lint", "yaml-lint", "lint-workflows", "rust-fmt", "markdown-lint"]
        name: "Check Lint Run"
        # This is necessary since a failed/skipped dependent job would cause this job to be skipped
        if: "always()"
        runs-on: "ubuntu-24.04"
        timeout-minutes: 5
        steps:
            # If any jobs we depend on fail, we will fail since this is a required check
            # NOTE: A timeout is considered a failure
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Check for failures"
              if: "contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')"
              run: |
                  echo "One of the dependent jobs have failed. You may need to re-run it." && exit 1
