# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
# Reusable: this workflow can be called from consumer repos via `workflow_call`.
name: "CodeQL"

on: # yamllint disable-line rule:truthy
    push:
        branches: ["main"]
    pull_request:
        # The branches below must be a subset of the branches above
        branches: ["main"]
    schedule:
        - cron: "0 0 * * 1"
    workflow_call:
        inputs:
            languages:
                description: "JSON array of CodeQL languages to analyze (e.g. '[\"javascript-typescript\"]')."
                required: false
                type: "string"
                default: "[\"javascript-typescript\"]"
            branches:
                description: "JSON array of branches for push/PR triggers (informational; caller wraps the workflow_call)."
                required: false
                type: "string"
                default: "[\"main\"]"
            schedule_cron:
                description: "Cron expression for scheduled analysis (informational; caller wraps the workflow_call)."
                required: false
                type: "string"
                default: "0 0 * * 1"
            runs_on:
                description: "Runner image for the analyze job."
                required: false
                type: "string"
                default: "ubuntu-latest"

permissions:
    contents: "read"

jobs:
    analyze:
        name: "Analyze"

        runs-on: "${{ inputs.runs_on || 'ubuntu-latest' }}"
        timeout-minutes: 30

        permissions:
            actions: "read"
            contents: "read"
            security-events: "write"

        strategy:
            fail-fast: false
            matrix:
                language: "${{ fromJSON(inputs.languages || '[\"javascript-typescript\"]') }}"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Checkout repository"
              uses: "actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1" # v7.0.1
              with:
                  persist-credentials: false

            # Initializes the CodeQL tools for scanning.
            - name: "Initialize CodeQL"
              uses: "github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1" # v4.37.2
              with:
                  languages: "${{ matrix.language }}"
                  # If you wish to specify custom queries, you can do so here or in a config file.
                  # By default, queries listed here will override any specified in a config file.
                  # Prefix the list here with "+" to use these queries and those in the config file.

            # Autobuild attempts to build any compiled languages  (C/C++, C#, or Java).
            # If this step fails, then you should remove it and run the build manually (see below)
            - name: "Autobuild"
              uses: "github/codeql-action/autobuild@e0647621c2984b5ed2f768cb892365bf2a616ad1" # v4.37.2

            # ℹ️ Command-line programs to run using the OS shell.
            # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun

            #   If the Autobuild fails above, remove it and uncomment the following three lines.
            #   modify them (or add more) to build your code if your project, please refer to the EXAMPLE below for guidance.

            # - run: |
            #   echo "Run, Build Application using script"
            #   ./location_of_script_within_repo/buildscript.sh

            - name: "Perform CodeQL Analysis"
              uses: "github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1" # v4.37.2
              with:
                  category: "/language:${{matrix.language}}"
