# Note: this is a shared pipeline used by other repositories.
# Docs: https://docs.github.com/en/actions/using-workflows/reusing-workflows

name: "AlloAllo"

on: # yamllint disable-line rule:truthy
    workflow_call:
        inputs:
            issue-welcome:
                description: "Message to show to a contributor opening their first issue."
                required: false
                default: >
                    It looks like this is your first issue. Welcome! рџ‘‹
                    One of the project maintainers will be with you as soon as possible. We
                    appreciate your patience. To safeguard the health of the project, please
                    take a moment to read our [code of conduct](../blob/main/.github/CODE_OF_CONDUCT.md).
                type: "string"
            pr-welcome:
                description: "Message to show to a contributor opening their first pull request."
                required: false
                default: >
                    It looks like this is your first pull request. рџЋ‰
                    Thank you for your contribution! One of the project maintainers will triage
                    and assign the pull request for review. We appreciate your patience. To
                    safeguard the health of the project, please take a moment to read our
                    [code of conduct](../blob/main/.github/CODE_OF_CONDUCT.md).
                type: "string"
            pr-merged:
                description: "Message to show to a contributor after first merged pull request."
                required: false
                type: "string"
            onboarding-lead:
                description: "The GitHub username of the onboarding lead."
                required: false
                type: "string"
            target-repo:
                description: "The repo to run this action on. This is to prevent actions from running on forks unless intended."
                required: true
                type: "string"

permissions:
    contents: "read"
    issues: "write"
    pull-requests: "write"

jobs:
    allo-allo:
        if: "github.repository == inputs.target-repo"
        name: "The welcome bot"
        runs-on: "ubuntu-latest"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594" # v2.16.0
              with:
                  egress-policy: "audit"

            - name: "Welcome"
              uses: "actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d" # v3.1.0
              with:
                  repo-token: "${{ secrets.GITHUB_TOKEN }}"
                  issue_message: "${{ inputs.issue-welcome }}"
                  pr_message: "${{ inputs.pr-welcome }}"

    comment_on_merged_pull_request:
        if: "github.event.pull_request.merged == true"
        runs-on: "ubuntu-latest"
        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              uses: "step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594" # v2.16.0
              with:
                  egress-policy: "audit"

            - name: "Checkout repository"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

            - name: "Set Environment Variables"
              env:
                  AUTHOR: "${{ github.event.pull_request.user.login }}"
                  REPO: "${{ github.event.repository.name }}"
                  OWNER: "${{ github.event.repository.owner.login }}"
              run: |
                  {
                    echo "AUTHOR=${AUTHOR}"
                    echo "REPO=${REPO}"
                    echo "OWNER=${OWNER}"
                  } >> "$GITHUB_ENV"

            - name: "Count Merged Pull Requests"
              id: "count_merged_pull_requests"
              uses: "actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd" # v8.0.0
              with:
                  github-token: "${{ secrets.GITHUB_TOKEN }}"
                  script: |
                      try {
                        const author = process.env.AUTHOR;
                        const repo = process.env.REPO;
                        const owner = process.env.OWNER;
                        const { data } = await github.rest.search.issuesAndPullRequests({
                          q: `repo:${owner}/${repo} type:pr state:closed author:${author}`
                        });
                        const prCount = data.items.filter(pr => pr.pull_request.merged_at).length;

                        core.exportVariable('PR_COUNT', prCount);
                      } catch (error) {
                        core.setFailed(`Error counting merged pull requests: ${error.message}`);
                      }

            - name: "Comment on the Merged Pull Request"
              uses: "actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd" # v8.0.0
              with:
                  github-token: "${{ secrets.GITHUB_TOKEN }}"
                  script: |
                      try {
                        const requiredEnvVars = ['PR_COUNT', 'AUTHOR', 'ONBOARDING_LEAD', 'OWNER', 'REPO'];
                        requiredEnvVars.forEach((varName) => {
                            if (!process.env[varName]) {
                                throw new Error(`Missing required environment variable: ${varName}`);
                            }
                        });

                        const prCount = parseInt(process.env.PR_COUNT, 10);
                        if (isNaN(prCount)) throw new Error("Invalid PR_COUNT. Ensure it is a valid number.");

                        const author = process.env.AUTHOR;
                        const mention = process.env.ONBOARDING_LEAD;
                        const prNumber = context.payload.pull_request.number;
                        const repo = process.env.REPO;

                        function getRandomEmoji() {
                            const emojis = ['рџЋ‰', 'рџљЂ', 'рџ’Є', 'рџЊџ', 'рџЏ†', 'рџЋЉ', 'рџ”Ґ', 'рџ‘Џ', 'рџЊ€', 'рџљ‚'];
                            return emojis[Math.floor(Math.random() * emojis.length)];
                        }

                        function getMessage(count) {
                          const emoji = getRandomEmoji();

                          switch(count) {
                            case 1:
                              return `${emoji} **Fantastic work @${author}!** Your very first PR to ${repo} has been merged! рџЋ‰рџҐі\n\n` +
                                     `You've just taken your first step into open-source, and we couldn't be happier to have you onboard. рџ™Њ\n` +
                                     `If you're feeling adventurous, why not dive into another issue and keep contributing? The community would love to see more from you! рџљЂ\n\n` +
                                     `For any support, feel free to reach out to the developer onboarding lead: @${mention}. Happy coding! рџ‘©вЂЌрџ’»рџ‘ЁвЂЌрџ’»`;
                            case 2:
                              return `${emoji} **Well done @${author}!** Two PRs merged already! рџЋ‰рџҐі\n\n` +
                                     `With your second PR, you're on a roll, and your contributions are already making a difference. рџЊџ\n` +
                                     `Looking forward to seeing even more contributions from you. The developer onboarding lead: @${mention} is here if you need any help! Keep up the great work! рџљЂ`;
                            case 3:
                              return `${emoji} **You're on fire, @${author}!** Three PRs merged and counting! рџ”ҐрџЋ‰\n\n` +
                                     `Your consistent contributions are truly impressive. You're becoming a valued member of our community! рџ’–\n` +
                                     `Have you considered taking on some more challenging issues? We'd love to see what you can do! рџ’Є\n\n` +
                                     `Remember, @${mention} is always here to support you. Keep blazing that trail! рџљЂ`;
                            case 5:
                              return `${emoji} **High five, @${author}!** You've hit the incredible milestone of 5 merged PRs! рџ–ђпёЏвњЁ\n\n` +
                                     `Your dedication to ${repo} is outstanding. You're not just contributing code; you're shaping the future of this project! рџЊ \n` +
                                     `We'd love to hear your thoughts on the project. Any ideas for new features or improvements? рџ¤”\n\n` +
                                     `@${mention} and the whole team applaud your efforts. You're a superstar! рџЊџ`;
                            case 10:
                              return `${emoji} **Double digits, @${author}!** 10 merged PRs is a massive achievement! рџЏ†рџЋЉ\n\n` +
                                     `Your impact on ${repo} is undeniable. You've become a pillar of our community! рџЏ›пёЏ\n` +
                                     `We'd be thrilled to have you take on a mentorship role for newer contributors. Interested? рџ§‘вЂЌрџЏ«\n\n` +
                                     `@${mention} and everyone here are in awe of your contributions. You're an open source hero! рџ¦ёвЂЌв™ЂпёЏрџ¦ёвЂЌв™‚пёЏ`;
                            default:
                              if (count > 25) {
                                return `${emoji} **Incredible, @${author}!** рџЋЇрџЋЉ\n\n` +
                                       `Your ongoing commitment to ${repo} is truly remarkable. You're a driving force in our community! рџљЂ\n` +
                                       `Your contributions are helping to shape the future of this project. What exciting features or improvements do you envision next? рџ”®\n\n` +
                                       `@${mention} and the entire team are grateful for your dedication. You're an inspiration to us all! рџ’«`;
                              } else {
                                return `${emoji} **Great job, @${author}!** You've merged your ${count}th PR! рџЋЉ\n\n` +
                                       `Your contributions to ${repo} are making a real difference. Keep up the fantastic work! рџ’Є\n` +
                                       `Remember, every PR counts and helps improve the project. What will you tackle next? рџ¤”\n\n` +
                                       `@${mention} is here if you need any guidance. Onward and upward! рџљЂ`;
                              }
                          }
                        }

                        let message = `${getRandomEmoji()} Thank you for your contribution, @${author}! рџЋ‰`;

                        if (process.env.PR_MERGED_MESSAGE) {
                            message = process.env.PR_MERGED_MESSAGE;
                        } else if (typeof prCount === 'number') {
                            message = getMessage(prCount);
                        }

                        await github.rest.issues.createComment({
                          owner: process.env.OWNER,
                          repo: process.env.REPO,
                          issue_number: prNumber,
                          body: message,
                        });
                      } catch (error) {
                        core.setFailed(`Error creating comment: ${error.message}`);
                      }
              env:
                  ONBOARDING_LEAD: "${{ inputs.onboarding-lead }}"
                  PR_MERGED_MESSAGE: "${{ inputs.pr-merged }}"
