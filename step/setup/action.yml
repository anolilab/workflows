name: "Setup Node Environment and Resources"
description: "Setup node.js and caching scoped within a workflow"

inputs:
    cwd:
        description: "Changes node's process.cwd() if the project is not located on the root. Default to process.cwd()"
        required: false
        default: "."
    enable-corepack:
        description: "Enable corepack"
        required: false
        default: "true"
    enable-nx-cache:
        description: "Enable nx cache"
        required: false
        default: "true"
    enable-node-modules-cache:
        description: "Cache node_modules, might speed up link step (invalidated lock/os/node-version/branch)"
        required: false
        default: "true"
    cache-prefix:
        description: "Add a specific cache-prefix"
        required: false
        default: "default"
    node-version:
        description: "The node.js version to use"
        required: false
        default: "22"
    upgrade-npm-version:
        description: "The npm version to use"
        required: false
        default: "true"
    run-npm-audit:
        description: "Run npm audit before we run pnpm install"
        required: false
        default: "true"
    run-signatures-audit:
        description: "Run the npm audit signatures after we run pnpm install"
        required: false
        default: "true"
    npm-version:
        description: "The npm version to use"
        required: false
        default: "latest"
    install-bun:
        description: "Install Bun for tests"
        required: false
        default: "false"
    install-packages:
        description: "Install npm packages"
        required: false
        default: "true"
    install-node-gyp:
        description: "Install node-gyp globally (required by native modules in pnpm-workspace.yaml#onlyBuiltDependencies; modern npm bundles node-gyp internally but does not expose it on PATH for pnpm)"
        required: false
        default: "false"
    skip-playwright:
        description: "Skip Playwright installation"
        required: false
        default: "true"
    install-cypress-binary:
        description: "Install Cypress Binary"
        required: false
        default: "false"

runs:
    using: "composite"
    steps:
        - name: "Set node version to ${{ inputs.node-version }}"
          uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
          with:
              node-version: "${{ inputs.node-version }}"
              # Disable implicit package-manager caching: the automatic logic can
              # change over time and we manage the pnpm store cache ourselves below.
              package-manager-cache: "false"

        - name: "Enable Corepack"
          if: "inputs.enable-corepack == 'true'"
          shell: "bash"
          working-directory: "${{ inputs.cwd }}"
          run: "corepack enable"

        - name: "Setup pnpm"
          uses: "pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271" # v6.0.9
          with:
              run_install: false

        - name: 'Expose pnpm config(s) through "$GITHUB_OUTPUT"' # yamllint disable-line rule:quoted-strings
          id: "pnpm-config"
          shell: "bash"
          run: |
              echo "STORE_PATH=$(pnpm store path | tr -d '\n')" >> $GITHUB_OUTPUT
              echo "CURRENT_BRANCH=$(echo ${GITHUB_REF#refs/heads/} | sed -r 's,/,-,g')" >> $GITHUB_OUTPUT

        - name: "Clear NODE_AUTH_TOKEN for OIDC"
          shell: "bash"
          # actions/setup-node sets a placeholder NODE_AUTH_TOKEN that blocks OIDC
          # See: https://github.com/actions/setup-node/issues/1440
          run: 'echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV' # yamllint disable-line rule:quoted-strings

        # @see: npm install -g npm@latest is necessary to make provenance available. More info: https://docs.npmjs.com/generating-provenance-statements
        - name: "Upgrade npm to ${{ inputs.npm-version }} version"
          if: "inputs.upgrade-npm-version == 'true'"
          shell: "bash"
          run: 'npm install --global "npm@${NPM_VERSION}"'
          env:
              SKIP_CHECK: "true"
              NPM_VERSION: "${{ inputs.npm-version }}"

        - name: "Configure npm registry"
          shell: "bash"
          run: "npm config set registry https://registry.npmjs.org/"

        - name: "Verify npm configuration"
          shell: "bash"
          run: |
              echo "npm version: $(npm --version)"
              echo "NODE_AUTH_TOKEN is set: $([[ -n \"$NODE_AUTH_TOKEN\" ]] && echo 'yes' || echo 'no')"
          env:
              SKIP_CHECK: "true"

        # Native modules listed in pnpm-workspace.yaml#onlyBuiltDependencies (e.g. nodehun)
        # invoke `node-gyp rebuild` from their install scripts. Modern npm bundles node-gyp
        # internally but does not expose it on PATH, so pnpm cannot find it.
        - name: "Install node-gyp"
          if: "inputs.install-node-gyp == 'true'"
          shell: "bash"
          run: "npm install --global node-gyp"
          env:
              SKIP_CHECK: "true"

        - name: "Cache rotation keys"
          id: "cache-rotation"
          shell: "bash"
          run: |
              echo "YEAR_MONTH=$(/bin/date -u "+%Y%m")" >> $GITHUB_OUTPUT

        # Split into restore + save so PR runs read the cache but never write to it.
        # actions/cache@v5 auto-saves at job exit regardless of permissions:
        # block — switching to /restore + a gated /save closes that path by design.
        - name: "Restore pnpm store cache"
          uses: "actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
          id: "pnpm-store-cache"
          with:
              path: "${{ steps.pnpm-config.outputs.STORE_PATH }}"
              key: "pnpm-store-cache-${{ inputs.cache-prefix }}-${{ runner.os }}-${{ inputs.node-version }}-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-${{ hashFiles('**/pnpm-lock.yaml') }}"
              restore-keys: |
                  pnpm-store-cache-${{ inputs.cache-prefix }}-${{ runner.os }}-${{ inputs.node-version }}-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-

        - name: "Download and build lz4"
          if: "runner.os == 'Windows'"
          shell: "powershell"
          # The path written to GITHUB_PATH is derived from `(Get-Item .).FullName`,
          # i.e. the workspace cwd — not from any user-controllable input.
          run: | # zizmor: ignore[github-env]
              Invoke-WebRequest https://github.com/lz4/lz4/releases/download/v1.9.4/lz4_win64_v1_9_4.zip -OutFile lz4-1.9.4.zip
              Expand-Archive -Path ".\lz4-1.9.4.zip" -DestinationPath ".\lz4-1.9.4" -Force

              echo "$((Get-Item .).FullName)\lz4-1.9.4" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

        - name: "Restore node_modules cache"
          if: "inputs.enable-node-modules-cache == 'true'"
          id: "node-modules-cache"
          uses: "actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
          with:
              path: "/tmp/node_modules.tar.lz4"
              key: "pnpm-nm-cache-${{ inputs.cache-prefix }}-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}"
              restore-keys: |
                  pnpm-nm-cache-${{ inputs.cache-prefix }}-${{ runner.os }}-${{ inputs.node-version }}-

        - name: "Restore node_modules"
          if: "inputs.enable-node-modules-cache == 'true' && steps.node-modules-cache.outputs.cache-hit == 'true'"
          shell: "bash"
          run: "lz4 -d /tmp/node_modules.tar.lz4 | tar -xf - ;" # decompress node_modules

        # nx-cache stays on actions/cache (auto-save) because the tarball is written
        # by the caller after this composite returns — there's no point inside this
        # action where we could attach a matching /save step. Callers who want
        # trusted-ref-only nx caching should pass enable-nx-cache=false and wire
        # their own actions/cache/restore + actions/cache/save pair.
        - name: "Check for Nx cache"
          if: "inputs.enable-nx-cache == 'true'"
          id: "nx-cache"
          uses: "actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
          with:
              path: "/tmp/nx_cache.tar.lz4"
              key: "cache-nx-${{ inputs.cache-prefix }}-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}"
              restore-keys: |
                  cache-nx-${{ inputs.cache-prefix }}-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('pnpm-lock.yaml') }}-
                  cache-nx-${{ inputs.cache-prefix }}-${{ runner.os }}-${{ inputs.node-version }}-

        - name: "Restore node_modules"
          if: "inputs.enable-node-modules-cache == 'true' && steps.nx-cache.outputs.cache-hit == 'true'"
          shell: "bash"
          run: "lz4 -d /tmp/nx_cache.tar.lz4 | tar -xf - ;" # decompress nx cache

        - name: "Verify the node packages of vulnerabilities"
          if: "inputs.run-npm-audit == 'true'"
          shell: "bash"
          run: "pnpm audit --audit-level=moderate"

        - name: "Install packages"
          if: "inputs.install-packages == 'true'"
          shell: "bash"
          run: "pnpm install --frozen-lockfile --prefer-offline"
          env:
              "PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD": "${{ inputs.skip-playwright }}"
              "CYPRESS_INSTALL_BINARY": "${{ inputs.install-cypress-binary }}"
              "SKIP_CHECK": "true" # is used to skip the check for the node version
              "HUSKY": 0 # disable husky hooks on ci

        # Save the pnpm store only from trusted refs (push to a protected branch).
        # PRs — including forks — restore the cache but never write to it, so a
        # poisoned fork build can't push entries the next main build will pick up.
        - name: "Save pnpm store cache"
          if: "inputs.install-packages == 'true' && github.event_name == 'push' && steps.pnpm-store-cache.outputs.cache-hit != 'true'"
          uses: "actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
          with:
              path: "${{ steps.pnpm-config.outputs.STORE_PATH }}"
              key: "${{ steps.pnpm-store-cache.outputs.cache-primary-key }}"

        - name: "Verify the integrity of provenance attestations and registry signatures for installed dependencies"
          shell: "bash"
          if: "inputs.run-signatures-audit == 'true' && inputs.install-packages == 'true'"
          run: "npm audit signatures"

        - name: "Install Bun for tests"
          if: "inputs.install-bun == 'true'"
          shell: "bash"
          run: "pnpm i -D bun --filter=package"

        - name: "Prepare node_modules cache"
          if: "inputs.enable-node-modules-cache == 'true' && inputs.install-packages == 'true'"
          shell: "bash"
          run: "tar -cf - node_modules | lz4 > /tmp/node_modules.tar.lz4" # compress node_modules

        # Same trusted-ref gating for the node_modules tarball cache.
        - name: "Save node_modules cache"
          if: "inputs.enable-node-modules-cache == 'true' && inputs.install-packages == 'true' && github.event_name == 'push' && steps.node-modules-cache.outputs.cache-hit != 'true'"
          uses: "actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
          with:
              path: "/tmp/node_modules.tar.lz4"
              key: "${{ steps.node-modules-cache.outputs.cache-primary-key }}"

        - name: "npm v8.5+ requires workspaces-update to be set to false"
          shell: "bash"
          run: "echo 'workspaces-update=false' >> .npmrc"
